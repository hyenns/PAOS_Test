<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>엑셀 데이터 정제 툴</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }
    header { background: linear-gradient(135deg, #2d6a4f, #52b788); color: white; padding: 28px 40px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    header .icon { font-size: 2rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 1100px; margin: 36px auto; padding: 0 24px; }
    .upload-zone { background: white; border: 2.5px dashed #52b788; border-radius: 16px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 28px; }
    .upload-zone:hover, .upload-zone.dragover { background: #f0faf4; border-color: #2d6a4f; }
    .upload-zone .upload-icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-zone h2 { font-size: 1.15rem; color: #2d6a4f; margin-bottom: 6px; }
    .upload-zone p { font-size: 0.85rem; color: #718096; }
    #fileInput { display: none; }
    .options-panel { background: white; border-radius: 16px; padding: 28px 32px; margin-bottom: 28px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); display: none; }
    .options-panel h2 { font-size: 1.05rem; font-weight: 700; color: #2d6a4f; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e2f4eb; }
    .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .option-card { border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: all 0.2s; background: #fafafa; }
    .option-card:hover { border-color: #52b788; background: #f0faf4; }
    .option-card.active { border-color: #2d6a4f; background: #e8f5ee; }
    .option-card label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
    .option-card input[type="checkbox"] { display: none; }
    .check-icon { width: 22px; height: 22px; border: 2px solid #cbd5e0; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: all 0.2s; margin-top: 1px; }
    .option-card.active .check-icon { background: #2d6a4f; border-color: #2d6a4f; color: white; }
    .option-text strong { display: block; font-size: 0.9rem; margin-bottom: 3px; }
    .option-text span { font-size: 0.78rem; color: #718096; }
    .sub-options { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e2e8f0; display: none; }
    .sub-options.show { display: block; }
    .sub-options label { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #4a5568; margin-bottom: 8px; cursor: pointer; }
    .sub-options input[type="text"] { display: inline-flex; border: 1px solid #cbd5e0; border-radius: 6px; padding: 4px 10px; font-size: 0.82rem; width: 100%; margin-top: 4px; }
    .col-selector { margin-top: 10px; display: none; }
    .col-selector.show { display: block; }
    .col-selector select, .sub-options select { width: 100%; padding: 7px 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 0.82rem; margin-top: 6px; background: white; }
    .col-selector label, .sub-options > label:first-child { font-size: 0.8rem; color: #4a5568; }
    .run-btn { background: linear-gradient(135deg, #2d6a4f, #52b788); color: white; border: none; border-radius: 10px; padding: 13px 36px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: block; width: 100%; }
    .run-btn:hover { opacity: 0.88; }
    .preview-section, .result-section { background: white; border-radius: 16px; padding: 28px 32px; margin-bottom: 28px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); display: none; }
    .preview-section h2, .result-section h2 { font-size: 1.05rem; font-weight: 700; color: #2d6a4f; margin-bottom: 16px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { background: #2d6a4f; color: white; padding: 10px 14px; text-align: left; white-space: nowrap; }
    td { padding: 9px 14px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    tr:nth-child(even) td { background: #f7fafc; }
    tr:hover td { background: #f0faf4; }
    .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-chip { background: #e8f5ee; border: 1px solid #52b788; border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; color: #2d6a4f; font-weight: 600; }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .btn-secondary { background: #f0faf4; border: 2px solid #52b788; color: #2d6a4f; border-radius: 8px; padding: 9px 20px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: #d8f0e3; }
    .log-box { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px 18px; font-size: 0.82rem; color: #4a5568; line-height: 1.7; max-height: 180px; overflow-y: auto; }
    .log-box li { margin-bottom: 4px; list-style: none; }
    .log-box li::before { content: "✅ "; }
  </style>
</head>
<body>
<header>
  <div class="icon">🧹</div>
  <div>
    <h1>엑셀 데이터 정제 툴</h1>
    <p>드래그&amp;드롭으로 파일을 올리고, 정제 옵션을 선택하세요</p>
  </div>
</header>
<div class="container">
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📂</div>
    <h2>엑셀 파일을 여기에 드롭하거나 클릭하여 업로드</h2>
    <p>.xlsx / .xls / .csv 지원</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv"/>
  </div>
  <div class="options-panel" id="optionsPanel">
    <h2>🔧 정제 옵션 선택</h2>
    <div class="options-grid">
      <div class="option-card" id="card-dup" onclick="toggleOption('dup')">
        <label><input type="checkbox" id="opt-dup"/><div class="check-icon" id="chk-dup"></div>
          <div class="option-text"><strong>🔁 중복 제거</strong><span>완전히 동일한 행을 제거합니다</span></div></label>
        <div class="sub-options" id="sub-dup">
          <label><input type="radio" name="dup-mode" value="all" checked> 모든 열 기준 중복 제거</label>
          <label><input type="radio" name="dup-mode" value="col"> 특정 열 기준</label>
          <div class="col-selector" id="sel-dup-col"><label>기준 열 선택</label><select id="dup-col-select" multiple></select></div>
        </div>
      </div>
      <div class="option-card" id="card-empty" onclick="toggleOption('empty')">
        <label><input type="checkbox" id="opt-empty"/><div class="check-icon" id="chk-empty"></div>
          <div class="option-text"><strong>🕳️ 빈 셀 처리</strong><span>빈 셀을 채우거나 행을 제거합니다</span></div></label>
        <div class="sub-options" id="sub-empty">
          <label><input type="radio" name="empty-mode" value="remove" checked> 빈 셀 포함 행 삭제</label>
          <label><input type="radio" name="empty-mode" value="fill"> 특정 값으로 채우기</label>
          <input type="text" id="empty-fill-val" placeholder="채울 값 입력 (예: N/A)" />
        </div>
      </div>
      <div class="option-card" id="card-text" onclick="toggleOption('text')">
        <label><input type="checkbox" id="opt-text"/><div class="check-icon" id="chk-text"></div>
          <div class="option-text"><strong>✏️ 텍스트 정리</strong><span>공백·특수문자·대소문자 정규화</span></div></label>
        <div class="sub-options" id="sub-text">
          <label><input type="checkbox" id="txt-trim" checked> 앞뒤 공백 제거</label>
          <label><input type="checkbox" id="txt-special"> 특수문자 제거</label>
          <label><input type="checkbox" id="txt-upper"> 모두 대문자로</label>
          <label><input type="checkbox" id="txt-lower"> 모두 소문자로</label>
        </div>
      </div>
      <div class="option-card" id="card-date" onclick="toggleOption('date')">
        <label><input type="checkbox" id="opt-date"/><div class="check-icon" id="chk-date"></div>
          <div class="option-text"><strong>📅 날짜 형식 통일</strong><span>날짜 열을 지정된 형식으로 변환</span></div></label>
        <div class="sub-options" id="sub-date">
          <label>출력 형식 선택</label>
          <label><input type="radio" name="date-fmt" value="YYYY-MM-DD" checked> YYYY-MM-DD</label>
          <label><input type="radio" name="date-fmt" value="YYYY/MM/DD"> YYYY/MM/DD</label>
          <label><input type="radio" name="date-fmt" value="DD/MM/YYYY"> DD/MM/YYYY</label>
          <div class="col-selector show"><label>날짜 열 선택</label><select id="date-col-select" multiple></select></div>
        </div>
      </div>
      <div class="option-card" id="card-filter" onclick="toggleOption('filter')">
        <label><input type="checkbox" id="opt-filter"/><div class="check-icon" id="chk-filter"></div>
          <div class="option-text"><strong>🔍 데이터 필터링</strong><span>조건에 맞는 행만 추출합니다</span></div></label>
        <div class="sub-options" id="sub-filter">
          <label>필터 열</label>
          <select id="filter-col-select"></select>
          <label>조건</label>
          <select id="filter-op">
            <option value="contains">포함</option>
            <option value="not_contains">포함하지 않음</option>
            <option value="equals">일치</option>
            <option value="starts">시작</option>
            <option value="ends">끝남</option>
            <option value="gt">보다 큼</option>
            <option value="lt">보다 작음</option>
          </select>
          <input type="text" id="filter-val" placeholder="조건 값 입력" />
        </div>
      </div>
    </div>
    <button class="run-btn" onclick="runCleaning()">🚀 정제 실행</button>
  </div>
  <div class="preview-section" id="previewSection">
    <h2>📋 원본 데이터 미리보기 (상위 10행)</h2>
    <div class="table-wrap" id="previewTable"></div>
  </div>
  <div class="result-section" id="resultSection">
    <h2>✅ 정제 결과</h2>
    <div class="stats-bar" id="statsBar"></div>
    <div class="action-row">
      <button class="btn-secondary" onclick="downloadResult()">⬇️ 결과 다운로드 (.xlsx)</button>
      <button class="btn-secondary" onclick="resetAll()">🔄 처음으로</button>
    </div>
    <div class="table-wrap" id="resultTable"></div>
    <br/>
    <div class="log-box"><ul id="logList"></ul></div>
  </div>
</div>
<script>
let rawData=[], headers=[], fileName='';
const uploadZone=document.getElementById('uploadZone'), fileInput=document.getElementById('fileInput');
uploadZone.addEventListener('click',()=>fileInput.click());
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])loadFile(fileInput.files[0]);});
function loadFile(file){
  fileName=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    headers=json[0]||[];
    rawData=json.slice(1).map(row=>{const obj={};headers.forEach((h,i)=>obj[h]=row[i]??'');return obj;});
    populateCols();
    renderTable('previewTable',headers,rawData.slice(0,10));
    document.getElementById('optionsPanel').style.display='block';
    document.getElementById('previewSection').style.display='block';
  };
  reader.readAsBinaryString(file);
}
function populateCols(){
  ['dup-col-select','date-col-select','filter-col-select'].forEach(id=>{
    const sel=document.getElementById(id); sel.innerHTML='';
    headers.forEach(h=>{const o=document.createElement('option');o.value=h;o.textContent=h;sel.appendChild(o);});
  });
}
function toggleOption(key){
  const card=document.getElementById('card-'+key), chk=document.getElementById('chk-'+key), sub=document.getElementById('sub-'+key);
  const active=card.classList.toggle('active');
  chk.textContent=active?'✓':'';
  sub.classList.toggle('show',active);
  if(key==='dup'){
    document.querySelectorAll('input[name="dup-mode"]').forEach(r=>r.addEventListener('change',()=>{
      document.getElementById('sel-dup-col').style.display=r.value==='col'?'block':'none';
    }));
  }
}
function runCleaning(){
  let data=rawData.map(r=>({...r}));
  const logs=[], origCount=data.length;
  if(document.getElementById('card-empty').classList.contains('active')){
    const mode=document.querySelector('input[name="empty-mode"]:checked').value;
    const fillVal=document.getElementById('empty-fill-val').value;
    if(mode==='remove'){
      const b=data.length;
      data=data.filter(row=>headers.every(h=>row[h]!==''&&row[h]!==null&&row[h]!==undefined));
      logs.push('빈 셀 포함 행 '+(b-data.length)+'개 삭제');
    } else {
      let filled=0;
      data.forEach(row=>headers.forEach(h=>{if(row[h]===''||row[h]===null||row[h]===undefined){row[h]=fillVal||'N/A';filled++;}}));
      logs.push('빈 셀 '+filled+'개를 "'+(fillVal||'N/A')+'"로 채움');
    }
  }
  if(document.getElementById('card-text').classList.contains('active')){
    const trim=document.getElementById('txt-trim').checked, special=document.getElementById('txt-special').checked;
    const upper=document.getElementById('txt-upper').checked, lower=document.getElementById('txt-lower').checked;
    data.forEach(row=>headers.forEach(h=>{
      if(typeof row[h]==='string'){
        if(trim)row[h]=row[h].trim();
        if(special)row[h]=row[h].replace(/[!@#$%^&*()\-_+=\[\]{};':"\\|,.<>\/?`~]/g,'');
        if(upper)row[h]=row[h].toUpperCase();
        else if(lower)row[h]=row[h].toLowerCase();
      }
    }));
    const ops=[trim&&'공백 제거',special&&'특수문자 제거',upper&&'대문자화',lower&&'소문자화'].filter(Boolean);
    logs.push('텍스트 정리: '+ops.join(', '));
  }
  if(document.getElementById('card-date').classList.contains('active')){
    const fmt=document.querySelector('input[name="date-fmt"]:checked').value;
    const cols=[...document.getElementById('date-col-select').selectedOptions].map(o=>o.value);
    let converted=0;
    data.forEach(row=>cols.forEach(h=>{
      const v=row[h]; if(!v)return;
      const d=new Date(v);
      if(!isNaN(d.getTime())){
        const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
        row[h]=fmt==='YYYY-MM-DD'?y+'-'+m+'-'+dd:fmt==='YYYY/MM/DD'?y+'/'+m+'/'+dd:dd+'/'+m+'/'+y;
        converted++;
      }
    }));
    logs.push('날짜 '+converted+'개 → '+fmt+' 변환 (열: '+(cols.join(', ')||'없음')+')');
  }
  if(document.getElementById('card-filter').classList.contains('active')){
    const col=document.getElementById('filter-col-select').value;
    const op=document.getElementById('filter-op').value;
    const val=document.getElementById('filter-val').value;
    const b=data.length;
    data=data.filter(row=>{
      const cell=String(row[col]??''), num=parseFloat(cell);
      if(op==='contains')return cell.includes(val);
      if(op==='not_contains')return !cell.includes(val);
      if(op==='equals')return cell===val;
      if(op==='starts')return cell.startsWith(val);
      if(op==='ends')return cell.endsWith(val);
      if(op==='gt')return !isNaN(num)&&num>parseFloat(val);
      if(op==='lt')return !isNaN(num)&&num<parseFloat(val);
      return true;
    });
    logs.push('필터링: ['+col+'] → '+data.length+'행 추출, '+(b-data.length)+'행 제외');
  }
  if(document.getElementById('card-dup').classList.contains('active')){
    const mode=document.querySelector('input[name="dup-mode"]:checked').value;
    const cols=mode==='col'?[...document.getElementById('dup-col-select').selectedOptions].map(o=>o.value):headers;
    const seen=new Set(), b=data.length;
    data=data.filter(row=>{const key=cols.map(h=>row[h]).join('|__|');if(seen.has(key))return false;seen.add(key);return true;});
    logs.push('중복 제거: '+(b-data.length)+'행 제거 (기준: '+(mode==='all'?'전체 열':cols.join(', '))+')');
  }
  document.getElementById('statsBar').innerHTML=
    '<div class="stat-chip">📄 원본 '+origCount+'행</div>'+
    '<div class="stat-chip">✅ 결과 '+data.length+'행</div>'+
    '<div class="stat-chip">🗑️ 제거 '+(origCount-data.length)+'행</div>';
  document.getElementById('logList').innerHTML=logs.map(l=>'<li>'+l+'</li>').join('')||'<li>적용된 정제 없음</li>';
  renderTable('resultTable',headers,data);
  document.getElementById('resultSection').style.display='block';
  document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
  window._resultData=data;
}
function renderTable(id,cols,rows){
  const wrap=document.getElementById(id);
  if(!rows.length){wrap.innerHTML='<p style="color:#c53030;padding:12px">결과 데이터가 없습니다.</p>';return;}
  let html='<table><thead><tr>'+cols.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>';
  rows.slice(0,50).forEach(row=>{html+='<tr>'+cols.map(h=>'<td>'+(row[h]??'')+'</td>').join('')+'</tr>';});
  if(rows.length>50)html+='<tr><td colspan="'+cols.length+'" style="text-align:center;color:#718096;padding:10px;">... 외 '+(rows.length-50)+'개 행</td></tr>';
  html+='</tbody></table>';
  wrap.innerHTML=html;
}
function downloadResult(){
  if(!window._resultData)return;
  const ws=XLSX.utils.json_to_sheet(window._resultData,{header:headers});
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Cleaned');
  XLSX.writeFile(wb,'정제결과_'+fileName);
}
function resetAll(){
  rawData=[];headers=[];fileName='';window._resultData=null;fileInput.value='';
  ['optionsPanel','previewSection','resultSection'].forEach(id=>document.getElementById(id).style.display='none');
  document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.check-icon').forEach(c=>c.textContent='');
  document.querySelectorAll('.sub-options').forEach(s=>s.classList.remove('show'));
}
</script>
</body>
</html>
